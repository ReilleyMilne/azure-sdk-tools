# Minimal Azure DevOps pipeline used ONLY to exercise the
# pipeline-analysis-next-steps trigger wiring in a personal fork.
#
# It intentionally fails so GitHub emits an `azure-pipelines` check_suite
# with conclusion == 'failure', which is what the trigger workflow listens for.
# Delete this file once trigger validation is complete.

trigger: none          # don't run on branch pushes

pr:                    # run on pull requests targeting main
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

steps:
  - script: |
      echo "Simulating a CI failure to test the pipeline-analysis trigger."
      exit 1
    displayName: "Fail on purpose"
